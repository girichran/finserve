<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile | FinServe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light dashboard-page">

<nav class="dashboard-nav">
    <div class="container dashboard-nav-inner">
        <a class="dashboard-brand" href="/dashboard">FinServe</a>
        <div class="dashboard-main-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/dashboard/performance">Performance</a>
            <a href="/dashboard/profile">Profile</a>
        </div>
        <div class="dashboard-user-actions">
            <button class="btn btn-sm btn-outline-light" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="interactive-heading mb-0">Profile</h3>
        <a href="/dashboard" class="btn btn-outline-primary btn-sm">Back to Dashboard</a>
    </div>

    <div class="card shadow-sm dashboard-card">
        <div class="card-header fw-bold interactive-heading">Account Details</div>
        <div class="card-body">
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <label class="form-label">Name</label>
                    <input class="form-control" value="{{ user_profile.name }}" disabled>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Email</label>
                    <input class="form-control" value="{{ user_profile.email }}" disabled>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Account Created</label>
                    <input class="form-control" value="{{ user_profile.created_at }}" disabled>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <label class="form-label">Subscription Type</label>
                    <input class="form-control" value="{{ active_subscription.plan_name if active_subscription else 'No Active Plan' }}" disabled>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Subscription Status</label>
                    <input class="form-control" value="{{ active_subscription.status if active_subscription else '-' }}" disabled>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Valid Till</label>
                    <input class="form-control" value="{{ active_subscription.ends_at if active_subscription else '-' }}" disabled>
                </div>
            </div>

            <div class="row g-2 align-items-end mb-4">
                <div class="col-md-4">
                    <label class="form-label">Phone Number</label>
                    <input id="profilePhone" class="form-control" value="{{ user_profile.phone }}" placeholder="Enter phone number">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="updateProfile()">Save Profile</button>
                </div>
            </div>

            <hr>

            <h6 class="mb-3">Change Password</h6>
            <div class="row g-2">
                <div class="col-md-4">
                    <input id="currentPassword" type="password" class="form-control" placeholder="Current password">
                </div>
                <div class="col-md-4">
                    <input id="newPassword" type="password" class="form-control" placeholder="New password">
                </div>
                <div class="col-md-4">
                    <input id="confirmPassword" type="password" class="form-control" placeholder="Confirm new password">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-outline-dark w-100" onclick="changePassword()">Update Password</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function logout() {
    fetch("/logout")
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        window.location.href = "/";
    });
}

function updateProfile() {
    const phone = (document.getElementById("profilePhone").value || "").trim();

    fetch("/profile/update", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ phone: phone })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message || "Completed");
        if (data.status === "success") {
            window.location.reload();
        }
    })
    .catch(() => alert("Failed to update profile"));
}

function changePassword() {
    const currentPassword = (document.getElementById("currentPassword").value || "").trim();
    const newPassword = (document.getElementById("newPassword").value || "").trim();
    const confirmPassword = (document.getElementById("confirmPassword").value || "").trim();

    fetch("/profile/change-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            current_password: currentPassword,
            new_password: newPassword,
            confirm_password: confirmPassword
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message || "Completed");
        if (data.status === "success") {
            document.getElementById("currentPassword").value = "";
            document.getElementById("newPassword").value = "";
            document.getElementById("confirmPassword").value = "";
        }
    })
    .catch(() => alert("Failed to update password"));
}
</script>

</body>
</html>
