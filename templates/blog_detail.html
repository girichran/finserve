<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ blog.title }} | FinServe Blog</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">FinServe</a>
        <a class="btn btn-outline-light btn-sm" href="/">Back to Home</a>
    </div>
</nav>

<main class="container py-4">
    <article class="card shadow-sm">
        <div class="card-body p-4">
            <h1 class="h3 mb-2">{{ blog.title }}</h1>
            <p class="text-muted mb-4">By <strong>Giri Charan</strong>, Technical Analyst | {{ blog.created_at }}</p>

            {% if blog.excerpt %}
            <p class="lead">{{ blog.excerpt }}</p>
            {% endif %}

            <div style="white-space: pre-line;">{{ blog.content }}</div>
        </div>
    </article>
</main>

</body>
</html>
